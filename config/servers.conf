#!/usr/bin/env bash

# =========================
# Configuración general
# =========================
CONNECT_TIMEOUT_SECONDS=5
SSH_COMMON_OPTIONS="-o BatchMode=yes -o ConnectTimeout=5"

# Colores
ENABLE_COLOR=true

# Directorio temporal para locks/estado
STATE_DIR="/tmp/logwatch"

# =========================
# Grupo WEB
# =========================
WEB_ENABLED=true
WEB_LOG_PATH="/var/log/nginx/access.log"
WEB_STOP_OTHER_SERVERS_ON_FIRST_MATCH=true

# Formato por entrada:
# name|connection_mode|ssh_alias|host|user|port
#
# connection_mode:
#   - alias  -> usa ssh_alias, por ejemplo: ssh server_1
#   - direct -> usa host/user/port
WEB_SERVERS=(
  "web01|alias|server_1|||"
  "web02|alias|server_2|||"
  "web03|alias|server_3|||"
  "web04|alias|server_4|||"
  "web05|alias|server_5|||"
  "web06|alias|server_6|||"
)

# =========================
# Grupo RADIUS
# =========================
RADIUS_ENABLED=true
RADIUS_LOG_PATH="/var/log/freeradius/radius.log"
RADIUS_ACTIVE_SERVER="radius1"

# Formato por entrada:
# name|connection_mode|ssh_alias|host|user|port
RADIUS_SERVERS=(
  "radius1|alias|radius_prod|||"
  "radius2|alias|radius_backup|||"
)